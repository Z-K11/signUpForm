<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main-container">
        <div class="image-section">
            <img src="media/imgs/background.webp" alt="Image by mike-perez taken from unspalsh">
            <div class="logo-background"><img src="media/imgs/odin-logo.png" alt="The odin project logo"></div>
        </div>
        <div class="formBody">
            <form action="" method="post">
                <div class="description">
                    <p>
                        This is not a real online service you know you need something
                        like this in your life to help you realize your deepest dreams.
                    </p>
                    <h3>Sign up now to Get Started.</h3>
                    <p>You <em>know</em> you want to.</p>
                </div>
                <h2 class="inputHeading">Let's do this!</h2>
                <ul class="main-body">
                    <li class="name">
                        <div class="firstName">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName">
                        </div>
                        <div class="lastName">
                            <label for="secondName">Second Name</label>
                            <input type="text" id="secondName" name="secondName">
                        </div>
                    </li>
                    <li class="contact-body">
                        <div class="email">
                            <label for="emailId">Email</label>
                            <input type="email" id="emailId" name="email">
                        </div>
                        <div class="phoneNumber">
                            <label for="contact">Phone Number</label>
                            <input type="tel" id="contact" name="phoneNumber">
                        </div>
                    </li>
                    <li class="passwordFields">
                        <div>
                            <label for="">Password</label>
                            <input type="password" required>
                        </div>
                        <div>
                            <label for="">Confirm Password</label>
                            <input type="password" required>
                        </div>
                    </li>
                </ul>
                <button type="submit">Create Account</button>
                <p>Already have an account ?  
                <a href="https://z-k11.github.io/signUpForm/">Log in</a>
                </p>
            </form>
        </div>
    </div>
</body>

</html>
